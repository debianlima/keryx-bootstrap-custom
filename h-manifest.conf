# Keryx Miner bootstrap package for HiveOS Custom Miner
# Este manifest e dinamico: funciona tanto em /hive/miners/custom
# quanto em uma pasta extraida manualmente para debug.
CUSTOM_SELF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
CUSTOM_NAME="${CUSTOM_MINER:-keryx-miner}"
CUSTOM_VERSION=0.3.2-OPoI-bootstrap-v19
CUSTOM_BUILD=19
CUSTOM_MINERBIN=keryx-miner
CUSTOM_CONFIG_FILENAME="${CUSTOM_CONFIG_FILENAME:-$CUSTOM_SELF_DIR/config.ini}"
CUSTOM_LOG_BASENAME="${CUSTOM_LOG_BASENAME:-/var/log/miner/keryx-miner}"
WEB_PORT="${WEB_PORT:-3338}"
